# Local Postgres for development.
# Uses the pgvector image so semantic IPO search can be added later without
# swapping the database. Start with: npm run docker:up
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-ipo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ipo
    ports:
      - "5432:5432"
    volumes:
      - ipo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_ipo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ipo_pgdata:
